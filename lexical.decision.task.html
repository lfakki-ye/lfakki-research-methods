<!DOCTYPE html>
<html>
  <head>
    <title>Layla's Lexical Decision Task Experiment</title>
    <script src="https://unpkg.com/jspsych@8.2.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
    <link href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet" type="text/css" />
   </head>
  <body></body>
  <script>
    const jsPsych = initJsPsych({
      on_finish: function() {
        jsPsych.data.get().localSave('csv', 'lexical_decision_data.csv');
      }
    });
    var timeline = [];

 var welcome = {
     type: jsPsychHtmlKeyboardResponse,
     stimulus: "Welcome to the experiment! You will be presented with words and non-words. Press 'w' if the item is a real word, and 'n' if it is not a real word. Good luck!"
   };
   timeline.push(welcome);

     var fixation = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: '<div style="font-size:60px;">+</div>',
        choices: "NO_KEYS",
        trial_duration: 500
    };

var test_stimuli = [
    { stimulus: "banana",  correct_response: 'w'},
    { stimulus: "abnana",  correct_response: 'n'},
    { stimulus: "grape",  correct_response: 'w'},
    { stimulus: "abgrape",  correct_response: 'n'},
    { stimulus: "orange",  correct_response: 'w'},
    { stimulus: "egorgan",  correct_response: 'n'},
    { stimulus: "blueberry",  correct_response: 'w'},
    { stimulus: "luerbry",  correct_response: 'n'}
    ]; 

    var lex_trial = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: jsPsych.timelineVariable('stimulus'),
        choices: ['w', 'n'],
        data: {
            task: 'lexical_decision',
        },
        on_start: function(trial){
            trial.data.correct_response = jsPsych.timelineVariable('correct_response');
        },
        on_finish: function(data){
            data.correct = data.response == data.correct_response;
        }
    };

    var lexical_procedure = {
        timeline: [fixation, lex_trial],
        timeline_variables: test_stimuli,
        randomize_order: true
    };

timeline.push(lexical_procedure);
    jsPsych.run(timeline);
  </script>
</html>
